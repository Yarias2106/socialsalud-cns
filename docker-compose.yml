version: "3.9"

services:
  backend:
    build: ./backend
    container_name: socialsalud-backend
    restart: unless-stopped
    volumes:
      - db_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/socialsalud.db
      - SECRET_KEY=cns-cambia-esta-clave-en-produccion-2024
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: socialsalud-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
